{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 40px auto;">
    <h2>User Login</h2>
    <p>Log in to manage your ticket reservations and account info.</p>
    <hr style="margin-bottom: 20px;">
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Login</button>
    </form>
    <p style="margin-top: 20px; text-align: center; font-size: 14px;">
        Don't have an account? <a href="{% url 'register' %}">Register here</a>
    </p>
</div>
{% endblock %}
