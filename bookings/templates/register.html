{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 40px auto;">
    <h2>Create an Account</h2>
    <p>Sign up to start planning and tracking your cruise itineraries.</p>
    <hr style="margin-bottom: 20px;">
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Register Account</button>
    </form>
    <p style="margin-top: 20px; text-align: center; font-size: 14px;">
        Already have an account? <a href="{% url 'login' %}">Login here</a>
    </p>
</div>
{% endblock %}
