<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cruise Booking System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; }
        nav { background: #1a365d; padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        nav .auth-links a { margin-left: 15px; margin-right: 0; }
        .container { padding: 30px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; border: 1px solid #e2e8f0; padding: 20px; margin: 15px 0; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn { background: #3182ce; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; display: inline-block; border: none; cursor: pointer; font-size: 14px;}
        .btn:hover { background: #2b6cb0; }
        form p { margin-bottom: 15px; }
        input[type="text"], input[type="password"], input[type="email"], input[type="number"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #cbd5e0; border-radius: 4px; }
    </style>
</head>
<body>
    <nav>
        <div>
            <a href="{% url 'home' %}">🚢 Cruise Explorer</a>
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>
            {% endif %}
        </div>
        <div class="auth-links">
            {% if user.is_authenticated %}
                <span style="color: #cbd5e0; margin-right: 15px;">Welcome, {{ user.username }}!</span>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}" class="btn" style="color: white; padding: 6px 12px;">Register</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
